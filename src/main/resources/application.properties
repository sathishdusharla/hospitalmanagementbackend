spring.application.name=backend

# Server Configuration
server.port=${PORT:8081}

# Database Configuration (can be overridden by environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-0-ap-south-1.pooler.supabase.com:6543/postgres?sslmode=require&connectTimeout=60&socketTimeout=60}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.wlrfvjrgkrszbvcwjoqi}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA Configuration
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET:${JWT_SECRET:meditrust-change-this-secret-in-production-must-be-32plus-chars!}}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# Hugging Face Chatbot Configuration
# Set HUGGINGFACE_API_KEY environment variable in production.
huggingface.api.key=${HUGGINGFACE_API_KEY:${HF_TOKEN:${HF_API_KEY:${HUGGINGFACEHUB_API_TOKEN:}}}}
huggingface.model=${HUGGINGFACE_MODEL:google/flan-t5-large}

# Multipart File Upload Configuration
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:50MB}

# File Upload Directory
app.upload.dir=${APP_UPLOAD_DIR:./uploads}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always